name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Validate release version
              run: |
                  manifest_version=$(node -p "require('./manifest.json').version")
                  package_version=$(node -p "require('./package.json').version")

                  [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
                    echo "Release tag must use x.y.z format without a v prefix"
                    exit 1
                  }

                  [[ "$GITHUB_REF_NAME" == "$manifest_version" && "$GITHUB_REF_NAME" == "$package_version" ]] || {
                    echo "Release tag, manifest version, and package version must match"
                    exit 1
                  }

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    --title="$GITHUB_REF_NAME" \
                    --draft \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
